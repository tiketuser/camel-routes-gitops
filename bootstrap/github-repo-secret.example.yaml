# Argo CD repository credential for the private GitHub repo.
# Create it imperatively so the token never lands in git:
#
#   kubectl create secret generic repo-camel-routes-gitops -n argocd \
#     --from-literal=type=git \
#     --from-literal=url=https://github.com/TheRozom/camel-routes-gitops.git \
#     --from-literal=username=TheRozom \
#     --from-literal=password="$(gh auth token)"   # or a fine-grained PAT with repo read
#   kubectl label secret repo-camel-routes-gitops -n argocd \
#     argocd.argoproj.io/secret-type=repository
#
# Prefer a fine-grained PAT (contents: read-only, this repo only) over `gh auth token`
# for anything longer-lived than local dev — Argo sync breaks when the token rotates.
apiVersion: v1
kind: Secret
metadata:
  name: repo-camel-routes-gitops
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://github.com/TheRozom/camel-routes-gitops.git
  username: TheRozom
  password: <GITHUB_TOKEN — do not commit>
