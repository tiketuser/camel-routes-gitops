apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: camel-routes
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/TheRozom/camel-routes-gitops.git
        revision: main
        files:
          - path: "routes/*.yaml"
  syncPolicy:
    # deleting the ApplicationSet (or its generator entry) cascades to the child app
    preserveResourcesOnDeletion: false
  template:
    metadata:
      name: 'route-{{.name}}'
      labels:
        app.kubernetes.io/part-of: camel-routes
        camel-route/type: '{{.routeType}}'
      finalizers:
        # background cascade: foreground deletion deadlocks with the Camel K operator,
        # which recreates the Integration's Deployment while GC is tearing it down
        - resources-finalizer.argocd.argoproj.io/background
    spec:
      project: camel-routes
      source:
        repoURL: https://github.com/TheRozom/camel-routes-gitops.git
        targetRevision: main
        path: charts/camel-route
        helm:
          valueFiles:
            - '../../{{.path.path}}/{{.path.filename}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: camel-k
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 5
