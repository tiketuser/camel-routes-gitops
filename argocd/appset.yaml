apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: camel-routes
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: http://gitea-http.git.svc.cluster.local:3000/gitops/camel-routes-gitops.git
        revision: main
        files:
          - path: "routes/*.yaml"
  template:
    metadata:
      name: 'route-{{.name}}'
      labels:
        app.kubernetes.io/part-of: camel-routes
    spec:
      project: camel-routes
      source:
        repoURL: http://gitea-http.git.svc.cluster.local:3000/gitops/camel-routes-gitops.git
        targetRevision: main
        path: charts/camel-route
        helm:
          valueFiles:
            - '../../{{.path.path}}/{{.path.filename}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: camel-k
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
