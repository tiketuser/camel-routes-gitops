# drain-mm-sink: consume DEV.MM.SINK as fast as possible and discard.
#
# DEV.MM.SINK is a terminal demo queue — nothing downstream ever reads from it,
# so with no consumer it silently fills to MAXDEPTH (5000) after a few hours of
# sustained mq-to-mq traffic. Once full, mq-to-mq's own JMS producer starts
# throwing MQRC_Q_FULL on every send, which Camel counts as a real exchange
# failure (not a rate-limit rejection). No rate limit here — draining faster
# than the 10 msg/s sink can ever fill is the point.
name: drain-mm-sink
routeType: mq-drain
source:
  queue: DEV.MM.SINK
rateLimit:
  enabled: false
