# kafka-to-kafka: consume kk-source -> rate-limit (blocking backpressure) -> produce kk-sink.
# Both sides inherit the chart-wide kafka: defaults; either side could set its own
# brokers/credentials to bridge two clusters.
name: kafka-to-kafka
source:
  kafka:
    topic: kk-source
    groupId: kk-bridge
sink:
  kafka:
    topic: kk-sink
kafka:
  brokers: kafka.kafka.svc.cluster.local:9092
  securityProtocol: SASL_PLAINTEXT
  saslMechanism: SCRAM-SHA-256
  credentialsSecret: kafka-scram-credentials
rateLimit:
  enabled: true
  key: kk
  rate: 10.0
  burst: 20
