{{- $t := include "camel-route.type" . -}}
{{- $httpSource := eq (include "camel-route.httpSource" .) "true" -}}
{{- $httpSink := eq (include "camel-route.httpSink" .) "true" -}}
{{- $usesKafka := eq (include "camel-route.usesKafka" .) "true" -}}
{{- $clientAuth := and $httpSource .Values.tls.enabled .Values.tls.clientAuth.enabled -}}
{{- $needsPlugin := or .Values.rateLimit.enabled $httpSink -}}
{{- $validate := .Values.validate.enabled -}}
{{/* one mount per distinct kafka credentials secret across the two sides */}}
{{- $kafkaSecrets := list -}}
{{- if eq (include "camel-route.sourceKind" .) "kafka" -}}
{{- $c := fromYaml (include "camel-route.kafkaConfig" (dict "side" .Values.source "root" $)) -}}
{{- $kafkaSecrets = append $kafkaSecrets (required "source kafka credentialsSecret required" $c.credentialsSecret) -}}
{{- end -}}
{{- if eq (include "camel-route.sinkKind" .) "kafka" -}}
{{- $c := fromYaml (include "camel-route.kafkaConfig" (dict "side" .Values.sink "root" $)) -}}
{{- $kafkaSecrets = append $kafkaSecrets (required "sink kafka credentialsSecret required" $c.credentialsSecret) -}}
{{- end -}}
{{- $kafkaSecrets = uniq $kafkaSecrets -}}
apiVersion: camel.apache.org/v1
kind: Integration
metadata:
  name: {{ required "name is required" .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: argocd
    camel-route/type: {{ $t }}
spec:
  {{- if gt (int .Values.replicas) 1 }}
  replicas: {{ .Values.replicas }}
  {{- end }}
  dependencies:
    {{- if $usesKafka }}
    - camel:kafka
    {{- end }}
    {{- if $httpSource }}
    - camel:platform-http
    {{- end }}
    {{- if $httpSink }}
    - camel:http
    {{- end }}
    {{- if $validate }}
    - camel:json-validator
    {{- end }}
    {{- if $needsPlugin }}
    - mvn:redis.clients:jedis:5.2.0
    {{- end }}
  traits:
    prometheus:
      enabled: {{ .Values.traits.prometheus.enabled }}
      podMonitor: {{ .Values.traits.prometheus.podMonitor }}
    {{- if or $usesKafka $httpSink $validate (and $httpSource .Values.tls.enabled) }}
    mount:
      {{- if $usesKafka }}
      configs:
        {{- range $kafkaSecrets }}
        - secret:{{ . }}
        {{- end }}
      {{- end }}
      {{- if or (and $httpSource .Values.tls.enabled) $httpSink $validate }}
      resources:
        {{- if and $httpSource .Values.tls.enabled }}
        - secret:{{ .Values.tls.secret }}@/etc/tls
        {{- end }}
        {{- if $clientAuth }}
        - secret:{{ .Values.tls.clientAuth.secret }}@/etc/tls-ca
        {{- end }}
        {{- if $httpSink }}
        - secret:{{ .Values.echoTls.secret }}@/etc/echo-tls
        {{- end }}
        {{- if $validate }}
        - configmap:{{ .Values.name }}-schema@/etc/schemas
        {{- end }}
      {{- end }}
    {{- end }}
    {{- if and $httpSource .Values.tls.enabled }}
    camel:
      properties:
        - quarkus.http.ssl-port=8443
        - quarkus.http.ssl.certificate.files=/etc/tls/tls.crt
        - quarkus.http.ssl.certificate.key-files=/etc/tls/tls.key
        {{- if $clientAuth }}
        - quarkus.http.ssl.client-auth=REQUIRED
        - quarkus.http.ssl.certificate.trust-store-file=/etc/tls-ca/client-ca.crt
        - quarkus.http.ssl.certificate.trust-store-file-type=PEM
        - quarkus.http.insecure-requests=disabled
        {{- end }}
    {{- end }}
    environment:
      vars:
        - REDIS_HOST={{ .Values.redis.host }}
        - REDIS_PORT={{ .Values.redis.port }}
  sources:
    {{- if $needsPlugin }}
    - name: RateLimit.java
      content: |
{{ .Files.Get "files/RateLimit.java" | indent 8 }}
    {{- end }}
    - name: {{ .Values.name }}.yaml
      content: |
{{ include "camel-route.routeYaml" . | indent 8 }}
