# Defaults for a camel-route. Per-route files in routes/*.yaml override these.
#
# ── Full schema ──────────────────────────────────────────────────────────────
# name: orders-kk                  # REQUIRED — Integration name (k8s name rules)
# routeType: kafka-kafka           # REQUIRED — kafka-kafka | https-kafka | https-https |
#                                  #            mq-mq | https-mq | mq-https
# source:
#   topic: kk-source               # kafka-kafka: source topic
#   httpPath: /ingest/hk           # https-*: platform-http path
#   queue: DEV.MM.SOURCE           # mq-*: source queue
# sink:
#   topic: kk-sink                 # *-kafka: sink topic
#   queue: DEV.MM.SINK             # *-mq (queue side): sink queue
#   url: echo-server.camel-k.svc.cluster.local/echo   # https-https / mq-https: downstream host+path,
#                                  # no scheme — the route always calls it over mTLS HTTPS
# kafka: {...}                     # override brokers/SASL below
# mq: {...}                        # override host/port/channel/qmgr/credentialsSecret below
# rateLimit:
#   enabled: true
#   key: kk                        # Redis bucket key; routes sharing a key share one limit
#   rate: 10.0                     # sustained tokens/s
#   burst: 20                      # bucket capacity
# tls:
#   enabled: true                  # https-* only: pod-terminated TLS on 8443
# replicas: 1

namespace: camel-k

kafka:
  brokers: kafka.kafka.svc.cluster.local:9092
  securityProtocol: SASL_PLAINTEXT
  saslMechanism: SCRAM-SHA-256
  credentialsSecret: kafka-scram-credentials   # must provide kafka.user / kafka.password

mq:
  host: mq.mq.svc.cluster.local
  port: 1414
  channel: DEV.APP.SVRCONN
  qmgr: QM1
  credentialsSecret: mq-app-credentials        # must provide mq.user / mq.password

rateLimit:
  enabled: true
  # key defaults to .Values.name when unset
  rate: 5.0
  burst: 10
  # mode defaults by source: kafka-*/mq-* (queue) -> block (backpressure), https-* -> reject (429).
  # Set explicitly only to override.
  mode: ""

redis:
  host: redis.redis.svc.cluster.local
  port: 6379

tls:
  enabled: true
  secret: ratelimit-tls           # mounted at /etc/tls (tls.crt / tls.key) — inbound server identity
  clientAuth:
    enabled: true                 # require + verify a client cert on the pod-TLS listener
    secret: bridge-client-ca      # provides client-ca.crt, the trust anchor for inbound mTLS

echoTls:
  secret: echo-client-tls         # bridge's outbound identity + echo-server truststore, mounted
                                   # at /etc/echo-tls whenever a route calls echo-server (sink.url set)

replicas: 1

traits:
  prometheus:
    enabled: true
    podMonitor: false
