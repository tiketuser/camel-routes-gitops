# Defaults for a camel-route. Per-route files in routes/*.yaml override these.
#
# ── Full schema ──────────────────────────────────────────────────────────────
# name: orders-kk                  # REQUIRED — Integration name (k8s name rules)
#
# source: / sink: each nest EXACTLY ONE kind key — kafka: or http:. The route
# type is inferred from the pair (no routeType field). A side's kafka: block is
# merged over the chart-wide kafka: defaults below, so source and sink can point
# at different clusters with different credentials.
#
# source:
#   kafka:
#     topic: kk-source             # REQUIRED for a kafka source
#     groupId: kk-bridge           # default: <name>-group
#     autoOffsetReset: earliest    # default: earliest
#     brokers: ...                 # any of the kafka: defaults below, per side
#     credentialsSecret: ...       # side-specific secret; if it coexists with
#     userKey: kafkab.user         #   another kafka side's secret, its keys must
#     passwordKey: kafkab.password #   be uniquely named — point these at them
#   http:
#     path: /ingest/hk             # platform-http path (TLS per tls: below)
# sink:
#   kafka:
#     topic: kk-sink               # REQUIRED for a kafka sink
#   http:
#     url: echo-server.camel-k.svc.cluster.local/echo   # downstream host+path,
#                                  # no scheme — always called over mTLS HTTPS
# kafka: {...}                     # chart-wide kafka defaults (below)
# rateLimit:
#   enabled: true
#   key: kk                        # Redis bucket key; routes sharing a key share one limit
#   rate: 10.0                     # sustained tokens/s
#   burst: 20                      # bucket capacity
# tls:
#   enabled: true                  # https-* only: pod-terminated TLS on 8443
# replicas: 1

namespace: camel-k

kafka:
  brokers: kafka.kafka.svc.cluster.local:9092
  securityProtocol: SASL_PLAINTEXT
  saslMechanism: SCRAM-SHA-256
  credentialsSecret: kafka-scram-credentials   # must provide kafka.user / kafka.password

rateLimit:
  enabled: true
  # key defaults to .Values.name when unset
  rate: 5.0
  burst: 10
  # mode defaults by source: kafka-* (queue) -> block (backpressure), https-* -> reject (429).
  # Set explicitly only to override.
  mode: ""

redis:
  host: redis.redis.svc.cluster.local
  port: 6379

tls:
  enabled: true
  secret: ratelimit-tls           # mounted at /etc/tls (tls.crt / tls.key) — inbound server identity
  clientAuth:
    enabled: true                 # require + verify a client cert on the pod-TLS listener
    secret: bridge-client-ca      # provides client-ca.crt, the trust anchor for inbound mTLS

echoTls:
  secret: echo-client-tls         # bridge's outbound identity + echo-server truststore, mounted
                                   # at /etc/echo-tls whenever a route calls echo-server (sink.url set)

replicas: 1

traits:
  prometheus:
    enabled: true
    podMonitor: false
