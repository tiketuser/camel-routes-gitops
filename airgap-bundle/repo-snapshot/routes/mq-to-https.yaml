# mq-to-https: consume DEV.MH.SOURCE -> rate-limit (block) -> forward to echo-server (mTLS).
name: mq-to-https
routeType: mq-https
source:
  queue: DEV.MH.SOURCE
sink:
  url: echo-server.camel-k.svc.cluster.local/echo
mq:
  host: mq.mq.svc.cluster.local
  port: 1414
  channel: DEV.APP.SVRCONN
  qmgr: QM1
  credentialsSecret: mq-app-credentials
rateLimit:
  enabled: true
  key: mh
  rate: 10.0
  burst: 20
