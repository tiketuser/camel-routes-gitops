# https-to-kafka: POST /ingest/hk -> rate-limit (429 over limit) -> produce hk-sink -> 202.
name: https-to-kafka
source:
  http:
    path: /ingest/hk
sink:
  kafka:
    topic: hk-sink
kafka:
  brokers: kafka.kafka.svc.cluster.local:9092
  securityProtocol: SASL_PLAINTEXT
  saslMechanism: SCRAM-SHA-256
  credentialsSecret: kafka-scram-credentials
rateLimit:
  enabled: true
  key: hk
  rate: 5.0
  burst: 10
