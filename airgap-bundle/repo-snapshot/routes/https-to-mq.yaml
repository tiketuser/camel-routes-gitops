# https-to-mq: POST /ingest/hm -> rate-limit (429 over limit) -> produce DEV.HM.SINK -> 202.
name: https-to-mq
routeType: https-mq
source:
  httpPath: /ingest/hm
sink:
  queue: DEV.HM.SINK
mq:
  host: mq.mq.svc.cluster.local
  port: 1414
  channel: DEV.APP.SVRCONN
  qmgr: QM1
  credentialsSecret: mq-app-credentials
rateLimit:
  enabled: true
  key: hm
  rate: 5.0
  burst: 10
