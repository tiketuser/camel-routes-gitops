# mq-to-mq: consume DEV.MM.SOURCE -> rate-limit (block) -> produce DEV.MM.SINK.
name: mq-to-mq
routeType: mq-mq
source:
  queue: DEV.MM.SOURCE
sink:
  queue: DEV.MM.SINK
mq:
  host: mq.mq.svc.cluster.local
  port: 1414
  channel: DEV.APP.SVRCONN
  qmgr: QM1
  credentialsSecret: mq-app-credentials
rateLimit:
  enabled: true
  key: mm
  rate: 10.0
  burst: 20
